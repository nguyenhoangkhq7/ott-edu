version: "3.8"

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$${MYSQL_USER}", "-p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 120s
    networks:
      - app-network

  mongo-db:
    image: mongo:6.0
    container_name: mongo-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - app-network

  core-service:
    build: ./services/core-service
    container_name: core-service
    restart: on-failure
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CONNECT_RETRIES: "60"
    expose:
      - "8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - app-network

  assignment-service:
    build: ./services/assignment-service
    container_name: assignment-service
    restart: on-failure
    env_file: .env
    ports:
      - "${ASSIGNMENT_PORT}:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - app-network

  chat-service:
    build:
      context: ./services/chat-service
      target: dev
    container_name: chat-service
    restart: on-failure
    command: npm run dev
    env_file: .env
    volumes:
      - ./services/chat-service:/app
      - /app/node_modules
    expose:
      - "3001"
    depends_on:
      - mongo-db
    networks:
      - app-network

  web-app:
    build:
      context: ./apps/web-app
      target: deps
    container_name: web-app
    restart: always
    command: npm run dev
    env_file: .env
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./apps/web-app:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${WEB_PORT}:3000"
    networks:
      - app-network

  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: always
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "${GATEWAY_PORT}:80"
    networks:
      - app-network

volumes:
  db_data:
  mongo_data:

networks:
  app-network:
    driver: bridge