name: Chat Service CI

on:
  push:
    paths:
      - "services/chat-service/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "services/chat-service/**"

jobs:
  build-lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/chat-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: services/chat-service/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint --if-present

      - name: Run Build Check
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-service-coverage-report
          path: services/chat-service/coverage/lcov-report
