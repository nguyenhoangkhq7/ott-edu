name: Assignment Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/assignment-service/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'services/assignment-service/pom.xml'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw
        working-directory: services/assignment-service

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests
        working-directory: services/assignment-service

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/assignment-service
          file: ./services/assignment-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ott-assignment-service:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ott-assignment-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ott-assignment-service:buildcache,mode=max
