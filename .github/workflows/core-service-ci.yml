name: Core Service CI

on:
  push:
    paths:
      - "services/core-service/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "services/core-service/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/core-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build and Test
        run: mvn clean verify

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-service-coverage-report
          path: services/core-service/target/site/jacoco
