name: Integration Test

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["develop"]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for gateway and core readiness
        run: |
          set -e
          echo "Waiting for gateway root..."
          for i in {1..120}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)
            if [ "$code" = "200" ]; then
              echo "Gateway is ready (200)."
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "Gateway did not become ready in time."
              docker compose logs gateway
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for core auth endpoint through gateway (no 502)..."
          for i in {1..150}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8000/api/core/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"healthcheck@example.com","password":"invalid"}' || true)
            if [ "$code" != "502" ] && [ "$code" != "000" ]; then
              echo "Core upstream is reachable through gateway (HTTP $code)."
              break
            fi
            if [ "$i" -eq 150 ]; then
              echo "Core upstream still unavailable after retries."
              docker compose logs core-service gateway
              exit 1
            fi
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Newman
        run: npm install -g newman

      - name: Run ALL Tests
        run: |
          for file in tests/postman/*.json; do
            echo "Testing $file..."
            newman run "$file" --env-var baseUrl=http://localhost:8000 --delay-request 200 || exit 1
          done
