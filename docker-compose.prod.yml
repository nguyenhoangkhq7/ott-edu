services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ott_education_db
      MYSQL_ASSIGNMENT_DATABASE: ott_assignment_db
    volumes:
      - db_data:/var/lib/mysql
      - ./gateway/mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 200M  
    networks:
      - app-network
  core-service:
    image: ${DOCKERHUB_USERNAME}/ott-core-service:latest
    container_name: core-service
    restart: always
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/ott_education_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MONGO_URI: mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/${MONGO_DB_NAME}?retryWrites=true&w=majority
      CHAT_SERVICE_BASE_URL: http://chat-service:3001/api
      JAVA_OPTS: "-XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Dspring.main.lazy-initialization=true -Xms64m -Xmx180m -XX:ActiveProcessorCount=1"
    expose:
      - "8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 300M 
    networks:
      - app-network
  assignment-service:
    image: ${DOCKERHUB_USERNAME}/ott-assignment-service:latest
    container_name: assignment-service
    restart: always
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/ott_assignment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      JAVA_OPTS: "-XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Dspring.main.lazy-initialization=true -Xms64m -Xmx180m -XX:ActiveProcessorCount=1"
    expose:
      - "8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 300M  
    networks:
      - app-network
  chat-service:
    image: ${DOCKERHUB_USERNAME}/ott-chat-service:latest
    container_name: chat-service
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      MONGO_CHAT_URI: mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/${MONGO_DB_NAME}?retryWrites=true&w=majority
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${EC2_PUBLIC_IP}
      MEDIASOUP_RTC_MIN_PORT: 40000
      MEDIASOUP_RTC_MAX_PORT: 40050
    expose:
      - "3001"
    ports:
      - "40000-40050:40000-40050/udp"
      - "40000-40050:40000-40050/tcp"
    deploy:
      resources:
        limits:
          memory: 150M # Node.js memory footprint limit
    networks:
      - app-network
  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: always
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./gateway/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          memory: 80M 
    networks:
      - app-network
volumes:
  db_data:
networks:
  app-network:
    driver: bridge
