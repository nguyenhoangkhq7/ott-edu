# ==============================================================================
# Local AI Stack Docker Compose (`docker-compose.local-ai.yml`)
# ==============================================================================
# Design Rationale:
#   - Runs entirely on your local PC to utilize your local GPU for free.
#   - Exposes the `ai-service` on port 8082 to be tunneled via Cloudflare Tunnel.
#   - Automatically downloads the specified LLM (Qwen) on first startup.
# ==============================================================================

version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. AI Database (PostgreSQL for Vector/Embeddings Storage)
  # ----------------------------------------------------------------------------
  ai-postgres-db:
    image: postgres:16-alpine
    container_name: ai-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${AI_POSTGRES_DB:-ai_service_db}
      POSTGRES_USER: ${AI_POSTGRES_USER:-ai_service}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD:-ai_service}
    volumes:
      - ai_pg_data:/var/lib/postgresql/data
      # Initial SQL schema setup for AI service
      - ./services/ai-service/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${AI_POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ai_service} -d $${POSTGRES_DB:-ai_service_db}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - ai-network

  # ----------------------------------------------------------------------------
  # 2. Ollama Server (Hosts LLMs, supports Nvidia GPU acceleration)
  # ----------------------------------------------------------------------------
  ollama-server:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    # Port exposed locally for API interaction
    ports:
      - "11434:11434"
    # Enables NVIDIA GPU Acceleration (If you have an Nvidia GPU and nvidia-container-toolkit installed)
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]
    networks:
      - ai-network

  # ----------------------------------------------------------------------------
  # 3. AI Service (Spring Boot Application)
  # ----------------------------------------------------------------------------
  ai-service:
    build: ./services/ai-service
    container_name: ai-service
    restart: on-failure
    env_file: .env
    environment:
      # Connects internally to postgres and ollama
      SPRING_DATASOURCE_URL: jdbc:postgresql://ai-postgres-db:5432/${AI_POSTGRES_DB:-ai_service_db}
      SPRING_DATASOURCE_USERNAME: ${AI_POSTGRES_USER:-ai_service}
      SPRING_DATASOURCE_PASSWORD: ${AI_POSTGRES_PASSWORD:-ai_service}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      OLLAMA_BASE_URL: http://ollama-server:11434
    ports:
      # Exposes port 8082 locally (Point Cloudflare Tunnel to this port!)
      - "${AI_PORT:-8082}:8080"
    depends_on:
      ai-postgres-db:
        condition: service_healthy
      ollama-server:
        condition: service_started
    networks:
      - ai-network

  # ----------------------------------------------------------------------------
  # 4. AI Engine Init (One-off container to pull specified LLM)
  # ----------------------------------------------------------------------------
  ai-engine-init:
    image: ollama/ollama:latest
    container_name: ai-engine-init
    restart: "no"
    env_file: .env
    depends_on:
      - ollama-server
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        wait_and_pull() {
          local host=$$1 model=$$2
          export OLLAMA_HOST=http://$$host
          
          echo "Waiting for Ollama Server ($$host) to start..."
          until ollama list >/dev/null 2>&1; do sleep 2; done
          echo "Ollama Server is ready!"
          
          if ollama list | grep -q "$$(echo $$model | cut -d: -f1)"; then
            echo "Model '$$model' already exists on local PC."
          else
            echo "Pulling model '$$model' to local PC... (This might take a few minutes)"
            ollama pull $$model
          fi
        }
        
        # Uses OLLAMA_CHAT_MODEL from your .env (defaulting to qwen2.5:7b-instruct)
        wait_and_pull "ollama-server:11434" "$${OLLAMA_CHAT_MODEL:-qwen2.5:7b-instruct}"
        echo "AI Engine Initialization Completed!"
    networks:
      - ai-network

# ------------------------------------------------------------------------------
# Volumes & Networks
# ------------------------------------------------------------------------------
volumes:
  ai_pg_data:
  ollama_data:

networks:
  ai-network:
    driver: bridge
