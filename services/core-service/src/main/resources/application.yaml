server:
  port: ${CORE_PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api/core

spring:
  application:
    name: core-service

  # --- THÊM ĐOẠN NÀY VÀO ---
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB
  # -------------------------

  datasource:
    url: jdbc:mysql://localhost:3306/ott_education_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: sapassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  mongodb:
    uri: mongodb://localhost:27017/ott_education_db

  flyway:
    enabled: true
    baseline-on-migrate: true
    connect-retries: 60
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  # Base64-encoded secret for HMAC signing (replace in production via JWT_SECRET env var).
  secret: ${JWT_SECRET:QmFzZTY0U2VjcmV0Rm9ySmF2YVNwcmluZ0Jvb3Q0SldUU2lnbmluZ1Nob3VsZEJlMzJCdHl0ZXM=}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:90000000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

app:
  cors:
    # Thêm http://localhost:8081 vào danh sách này
    allowed-origins: http://localhost:3000,http://localhost:8000,http://localhost:8081,http://192.168.1.19:8081
  cookie:
    path: ${APP_COOKIE_PATH:/api/core/auth}
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAMESITE:Lax}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}