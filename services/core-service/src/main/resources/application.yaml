server:
  port: ${CORE_PORT:8080}

spring:
  application:
    name: core-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ott_education_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:admin}
    password: ${MYSQL_PASSWORD:admin_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    connect-retries: 60
    locations: classpath:db/migration
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:5MB}

jwt:
  # Base64-encoded secret for HMAC signing (replace in production via JWT_SECRET env var).
  secret: ${JWT_SECRET:QmFzZTY0U2VjcmV0Rm9ySmF2YVNwcmluZ0Jvb3Q0SldUU2lnbmluZ1Nob3VsZEJlMzJCdHl0ZXM=}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  otp-verified-token-expiration-ms: ${OTP_VERIFIED_TOKEN_EXPIRATION_MS:600000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000}
  cookie:
    path: ${APP_COOKIE_PATH:/api/core/auth}
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAMESITE:Lax}
  mail:
    from: ${MAIL_FROM:no-reply@teams-connect.local}
  otp:
    ttl-seconds: ${OTP_TTL_SECONDS:300}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
  storage:
    s3:
      region: ${AWS_S3_REGION:ap-southeast-1}
      bucket: ${AWS_S3_BUCKET:ott-edu-public-assets}
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
      avatar-folder: ${AWS_S3_AVATAR_FOLDER:avatars}
      max-file-size-bytes: ${AWS_S3_AVATAR_MAX_FILE_SIZE_BYTES:5242880}
