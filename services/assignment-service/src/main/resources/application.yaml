server:
  port: 8080

spring:
  application:
    name: assignment-service

  datasource:
    url: jdbc:mysql://mysql-db:3306/ott_education_db?useSSL=false&allowPublicKeyRetrieval=true
    username: ott_app
    password: sapassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false