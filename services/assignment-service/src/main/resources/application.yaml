server:
  port: 8080

spring:
  application:
    name: assignment-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_ASSIGNMENT_DATABASE:ott_assignment_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    table: assignment_flyway_schema_history
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false
    validate-on-migrate: false
    connect-retries: 60

jwt:
  # Base64-encoded secret for HMAC signing (replace in production via JWT_SECRET env var).
  secret: ${JWT_SECRET:QmFzZTY0U2VjcmV0Rm9ySmF2YVNwcmluZ0Jvb3Q0SldUU2lnbmluZ1Nob3VsZEJlMzJCdHl0ZXM=}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  otp-verified-token-expiration-ms: ${OTP_VERIFIED_TOKEN_EXPIRATION_MS:600000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8000}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

