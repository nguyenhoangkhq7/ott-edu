server:
  port: 8081

spring:
  application:
    name: assignment-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ott_education_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:admin}
    password: ${MYSQL_PASSWORD:admin_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_assignment_history

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:QmFzZTY0U2VjcmV0Rm9ySmF2YVNwcmluZ0Jvb3Q0SldUU2lnbmluZ1Nob3VsZEJlMzJCdHl0ZXM=}
