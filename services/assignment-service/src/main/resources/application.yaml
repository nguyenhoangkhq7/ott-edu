server:
  port: 8080

spring:
  application:
    name: assignment-service

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: "yyyy-MM-dd'T'HH:mm:ss"

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ott_education_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      #      ddl-auto: validate
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}

# ---- Chat Service Config ----
chat:
  service:
    url: ${CHAT_SERVICE_URL:http://localhost:3000}

# ---- JWT Configuration ----
jwt:
  # Base64-encoded secret for HMAC signing (replace in production via JWT_SECRET env var).
  secret: ${JWT_SECRET:QmFzZTY0U2VjcmV0Rm9ySmF2YVNwcmluZ0Jvb3Q0SldUU2lnbmluZ1Nob3VsZEJlMzJCdHl0ZXM=}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  otp-verified-token-expiration-ms: ${OTP_VERIFIED_TOKEN_EXPIRATION_MS:600000}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always
