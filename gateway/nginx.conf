events {
    worker_connections 1024;
}

http {
    # Tăng kích thước body để upload ảnh/file nếu cần
    client_max_body_size 20M;
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;

        location = /_auth/validate {
            internal;
            set $core_auth_upstream core-service:8080;
            proxy_pass http://$core_auth_upstream/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 1. Frontend (Next.js)
        location / {
            set $web_upstream web-app:3000;
            proxy_pass http://$web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Backend Java (Core Service)
        location /api/core/auth/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/assignment/ {
            proxy_pass http://assignment-service:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/schools/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/api/schools/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/ {
            auth_request /_auth/validate;
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Backend Node (Chat Service)
        location /api/chat/ {
            auth_request /_auth/validate;
            set $chat_upstream chat-service:3001;
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://$chat_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 4. Socket.io (Chat Realtime)
        location /socket.io/ {
            set $chat_socket_upstream chat-service:3001;
            proxy_pass http://$chat_socket_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}