events {
    worker_connections 1024;
}

http {
    # Tăng kích thước body để upload ảnh/file nếu cần
    client_max_body_size 20M;
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate /etc/nginx/certs/dev.crt;
        ssl_certificate_key /etc/nginx/certs/dev.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Tăng timeout để tránh lỗi 502/504 khi backend xử lý chậm
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;

        location /_auth/validate {
            internal;
            set $core_auth_upstream core-service:8080;
            set $auth_header $http_authorization;
            if ($auth_header = "") {
                set $auth_header "Bearer $arg_token";
            }
            proxy_pass http://$core_auth_upstream/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $auth_header;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 1. Frontend (Next.js)
        location / {
            set $web_upstream web-app:3000;
            proxy_pass http://$web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Support auth routes from frontend directly
        location /auth/ {
            set $core_upstream core-service:8080;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Support public school lookup routes from frontend directly
        location /schools/ {
            set $core_upstream core-service:8080;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Backend Java (Core Service)
        # Auth endpoints (login, register, refresh) - NO auth required
        location ~ /api/core/auth/(login|register|refresh)$ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/assignment/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $assignment_upstream assignment-service:8080;
            proxy_pass http://$assignment_upstream/;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/schools/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Backend Node (Chat Service)
        location /api/chat/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $chat_upstream chat-service:3001;
            rewrite ^/api/chat/(.*)$ /api/$1 break;
            proxy_pass http://$chat_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 4. Socket.io (Chat Realtime)
        location /socket.io/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, User-Agent, X-Requested-With' always;
            add_header 'Vary' 'Origin' always;

            set $socket_authorization $http_authorization;
            if ($socket_authorization = "") {
                set $socket_authorization "Bearer $arg_token";
            }
            if ($socket_authorization = "Bearer ") {
                return 401;
            }

            set $chat_socket_upstream chat-service:3001;
            proxy_pass http://$chat_socket_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Authorization $socket_authorization;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }
}