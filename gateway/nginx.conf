events {
    worker_connections 1024;
}

http {
    # Tăng kích thước body để upload ảnh/file nếu cần
    client_max_body_size 20M;
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;

        location = /_auth/validate {
            internal;
            set $core_auth_upstream core-service:8080;
            proxy_pass http://$core_auth_upstream/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 1. Frontend (Next.js)
        location / {
            set $web_upstream web-app:3000;
            proxy_pass http://$web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Support auth routes from frontend directly
        location /auth/ {
            set $core_upstream core-service:8080;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Support public school lookup routes from frontend directly
        location /schools/ {
            set $core_upstream core-service:8080;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Backend Java (Core Service)
        location /api/core/auth/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # assignment-service: Spring Boot dùng @RequestMapping("/api/assignments")
        # nên forward nguyên path, không rewrite
        location /api/assignments {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $assignment_upstream assignment-service:8080;
            proxy_pass http://$assignment_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/schools/ {
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/core/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $core_upstream core-service:8080;
            rewrite ^/api/core/(.*)$ /$1 break;
            proxy_pass http://$core_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Backend Node (Chat Service)
        location /api/chat/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $chat_upstream chat-service:3001;
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://$chat_upstream;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 4. Socket.io (Chat Realtime)
        location /socket.io/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
            auth_request /_auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
            auth_request_set $auth_email $upstream_http_x_auth_email;
            auth_request_set $auth_roles $upstream_http_x_auth_roles;
            set $chat_socket_upstream chat-service:3001;
            proxy_pass http://$chat_socket_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Email $auth_email;
            proxy_set_header X-User-Roles $auth_roles;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}